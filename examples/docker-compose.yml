services:
  source-clickhouse:
    image: clickhouse/clickhouse-server:25.10
    container_name: chcopy-example-source-server
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: default_password
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./initial-schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./seed-data.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro

  local-clickhouse:
    image: clickhouse/clickhouse-server:25.10
    container_name: chcopy-example-local-server
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: default_password
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8124:8123"
      - "9001:9000"
    volumes:
      - ./initial-schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
