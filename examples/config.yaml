connection:
  dial_timeout: 30s  # clickhouse-go default
  read_timeout: 5m   # clickhouse-go default

import_configurations:
  - name: dev_import
    tables:
      - table: shop.users
        where: ""
        truncate: true
      - table: shop.orders
        where: "WHERE created_at >= '2026-05-01'"
        truncate: true

  - name: batch_import
    tables:
      - table: shop.events
        where: "WHERE year >= 2024"
        batch: "year"
        truncate: true
